<section id="contact" class="section">
  <div class="container">
    <div class="contact-header text-center reveal">
      <h2 class="section-title">Get In <span class="text-gradient">Touch</span></h2>
      <p class="contact-subtitle">I'm always open to discussing new projects, creative ideas, or opportunities to be part of your vision.</p>
    </div>

    <div class="contact-wrapper">
      <div class="glass-card contact-card reveal">
        
        @if (!isSubmitted) {
          <form class="contact-form" (submit)="onSubmit($event, nameInput.value, emailInput.value, messageInput.value)">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" #nameInput required placeholder="John Doe" class="form-control" [disabled]="isSubmitting">
            </div>
            
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" #emailInput required placeholder="john@example.com" class="form-control" [disabled]="isSubmitting">
            </div>
            
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" #messageInput required rows="5" placeholder="Tell me about your project..." class="form-control" [disabled]="isSubmitting"></textarea>
            </div>

            <button type="submit" class="btn-primary submit-btn" [disabled]="isSubmitting">
              {{ isSubmitting ? 'Sending...' : 'Send Message' }}
            </button>
          </form>
        } @else {
          <div class="success-message">
            <div class="success-animation">
              <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
              </svg>
            </div>
            <h3 class="success-title text-gradient">Message Sent!</h3>
            <p class="success-desc">Thank you for reaching out. I'll get back to you as soon as possible.</p>
            <button class="btn-secondary" (click)="resetForm()">Send Another Message</button>
          </div>
        }

      </div>
    </div>
  </div>
</section>
